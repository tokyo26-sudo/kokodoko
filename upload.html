<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ここどこ？ — 問題を投こうする</title>
  <!-- ver 0.4 -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f7f6f2;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e0ddd5;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; color: #1a1a1a; }
    .logo span { color: #1D9E75; }

    .main { max-width: 520px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: #888; margin-bottom: 2rem; line-height: 1.7; }

    .card {
      background: #fff;
      border: 1px solid #e0ddd5;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .card-title {
      font-size: 12px; color: #aaa;
      letter-spacing: 0.15em; text-transform: uppercase;
      font-weight: 700; margin-bottom: 1rem;
    }

    /* ドロプゾン */
    .dropzone {
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #f7f6f2;
      position: relative;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #1D9E75;
      background: #f0faf6;
    }
    .dropzone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .dropzone-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .dropzone-text { font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .dropzone-sub { font-size: 12px; color: #aaa; }

    /* プレビュ */
    .preview-wrap {
      display: none;
      margin-top: 1rem;
    }
    .preview-img {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e0ddd5;
      position: relative;
    }
    .preview-img img {
      width: 100%; display: block;
      max-height: 300px; object-fit: cover;
    }
    .preview-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,255,255,0.9);
      color: #c0392b;
      border: none; border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .preview-meta {
      font-size: 12px; color: #888;
      margin-top: 8px;
    }

    /* GPS警告 */
    .gps-notice {
      background: #E1F5EE;
      border: 1px solid #b2e8d4;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #0F6E56;
      margin-top: 10px;
      display: none;
    }

    /* フォム */
    label.field-label {
      display: block;
      font-size: 13px; font-weight: 700;
      margin-bottom: 6px;
    }
    .field-sub {
      font-size: 12px; color: #888;
      margin-bottom: 8px;
    }
    input[type="email"], input[type="text"], textarea {
      width: 100%; padding: 11px 14px;
      font-size: 15px;
      border: 1.5px solid #ddd; border-radius: 10px;
      background: #f7f6f2; color: #1a1a1a;
      outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px #E1F5EE; }

    .rules {
      background: #fafaf8;
      border: 1px solid #e0ddd5;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: 13px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 1.2rem;
    }
    .rules li { margin-left: 1.2rem; }

    .btn-green {
      width: 100%; padding: 14px;
      font-size: 16px; font-weight: 700;
      background: #1D9E75; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
      font-family: inherit;
      letter-spacing: 0.5px;
    }
    .btn-green:hover { background: #0F6E56; }
    .btn-green:disabled { background: #ccc; cursor: not-allowed; }

    .err-msg { font-size: 13px; color: #c0392b; margin-top: 8px; min-height: 18px; }
    .success-msg {
      text-align: center;
      padding: 2rem;
    }
    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .success-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: #888; line-height: 1.7; }

    .ver-badge {
      position: fixed; bottom: 0.8rem; right: 1rem;
      font-size: 11px; color: #ccc; z-index: 100;
    }

    a.back-link {
      font-size: 13px; color: #888;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    a.back-link:hover { color: #1D9E75; }
  </style>
</head>
<body>

<div class="header">
  <a class="logo" href="index.html">ここ<span>どこ</span>？</a>
  <a class="back-link" href="index.html">← トップへ</a>
</div>

<div class="main">
  <div class="page-title">📤 問題を投こうする</div>
  <div class="page-sub">
    「ここどこ？」のゲームに使う写真を投こうできます。<br>
    ホストが審査してOKになった写真がゲームで使われます。
  </div>

  <ul class="rules">
    <li>1アカウントにつき1日3まいまで</li>
    <li>おなじ写真の二重とうこうはできません</li>
  </ul>

  <div id="form-area">

    <!-- 写真 -->
    <div class="card">
      <div class="card-title">写真を選ぶ</div>
      <div class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept="image/jpeg">
        <div class="dropzone-icon">🖼️</div>
        <div class="dropzone-text">クリックまたはドラッグで写真を選ぶ</div>
        <div class="dropzone-sub">JPGのみ　最大5MB</div>
      </div>

      <div class="preview-wrap" id="preview-wrap">
        <div class="preview-img">
          <img id="preview-img" src="" alt="プレビュー">
          <button class="preview-remove" onclick="removePhoto()">✕</button>
        </div>
        <div class="preview-meta" id="preview-meta"></div>
      </div>

      <div class="gps-notice" id="gps-notice">
        ✅ 位置情報（GPS）を自動でけしました
      </div>
    </div>

    <!-- 投こうしゃじょほ -->
    <div class="card">
      <div class="card-title">投こう者情報</div>
      <label class="field-label">なまえ</label>
      <input type="text" id="name-input" placeholder="例：にしむら" style="margin-bottom:14px">
      <label class="field-label">メールアドレス（任意）</label>
      <input type="email" id="email-input" placeholder="your@email.com">
    </div>

    <!-- 撮影地 -->
    <div class="card">
      <div class="card-title">写真の撮影地</div>
      <textarea id="comment-input" rows="3" placeholder="例：○○県✕✕市○✕　等"></textarea>
    </div>

    <button class="btn-green" id="submit-btn" onclick="submitUpload()" disabled>
      投こうする
    </button>
    <div class="err-msg" id="err-msg"></div>

  </div>

  <!-- かんりょう画面 -->
  <div id="done-area" style="display:none">
    <div class="card">
      <div class="success-msg">
        <div class="success-icon">🎉</div>
        <div class="success-title">投こうありがとう！</div>
        <div class="success-sub">
          ホストが審査します。<br>
          OKになったらゲームで使われますよ！
        </div>
      </div>
    </div>
    <button class="btn-green" onclick="resetForm()">もう1まい投こうする</button>
  </div>

</div>

<div class="ver-badge">ver 0.4</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYPa53eFJqz_dlsuL0sJ-atzPHsY8Ay1AgLBN5z5WNP5-J0IRQXnYZoXPGtdyVVKl1/exec';

  let selectedFile = null;
  let compressedDataUrl = null;

  // ドロプゾン
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
  });

  function handleFile(file) {
    if (file.size > 5 * 1024 * 1024) {
      showErr('ファイルサイズが5MBをこえてるデス！');
      return;
    }
    if (!file.type.match('image/jpeg')) {
      showErr('JPGファイルをえらんでクダサイ！');
      return;
    }

    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      const originalDataUrl = e.target.result;
      const img = new Image();
      img.onload = () => {
        // かいてんじょほよみとる
        let orientation = 1;
        try {
          // piexifjsなしでも、キャンバスかきなおしでExifはきえる
        } catch(err) {}

        // キャンバスでかきなおし（GPS含むExifぜんぶけす）
        const canvas = document.createElement('canvas');
        const maxW = 1920;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        compressedDataUrl = canvas.toDataURL('image/jpeg', 0.85);

        // プレビュひょうじ
        document.getElementById('preview-img').src = compressedDataUrl;
        document.getElementById('preview-wrap').style.display = 'block';
        document.getElementById('gps-notice').style.display = 'block';
        document.getElementById('preview-meta').textContent =
          `${file.name}　${(file.size / 1024 / 1024).toFixed(1)}MB → あつしゅく済み`;

        document.getElementById('submit-btn').disabled = false;
        showErr('');
      };
      img.src = originalDataUrl;
    };
    reader.readAsDataURL(file);
  }

  function removePhoto() {
    selectedFile = null;
    compressedDataUrl = null;
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('gps-notice').style.display = 'none';
    document.getElementById('submit-btn').disabled = true;
    fileInput.value = '';
  }

  function submitUpload() {
    if (!compressedDataUrl) {
      showErr('写真をえらんでクダサイ！');
      return;
    }

    const name = document.getElementById('name-input').value.trim();
    const email = document.getElementById('email-input').value.trim();
    const comment = document.getElementById('comment-input').value.trim();

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '送信中…';

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'submitUpload',
        uploaderName: name || '（なし）',
        uploaderEmail: email || '（なし）',
        imageUrl: compressedDataUrl,
        comment: comment
      })
    })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          document.getElementById('form-area').style.display = 'none';
          document.getElementById('done-area').style.display = 'block';
        } else {
          showErr('エラー：' + (data.error || 'もういちどためしてクダサイ'));
          btn.disabled = false;
          btn.textContent = '投こうする';
        }
      })
      .catch(() => {
        showErr('つうしんエラーデス。もういちどためしてクダサイ。');
        btn.disabled = false;
        btn.textContent = '投こうする';
      });
  }

  function resetForm() {
    removePhoto();
    document.getElementById('name-input').value = '';
    document.getElementById('email-input').value = '';
    document.getElementById('comment-input').value = '';
    document.getElementById('form-area').style.display = 'block';
    document.getElementById('done-area').style.display = 'none';
  }

  function showErr(msg) {
    document.getElementById('err-msg').textContent = msg;
  }
</script>
</body>
</html>
